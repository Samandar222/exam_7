{% extends 'base.html' %}
{% block title %}Create Post — Blog API{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card p-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div style="width:46px;height:46px;background:rgba(108,99,255,0.14);border-radius:12px;display:flex;align-items:center;justify-content:center;">
                    <i class="fa-solid fa-pen-nib" style="color:#8b80ff;font-size:1.1rem;"></i>
                </div>
                <div>
                    <h4 style="font-weight:800;margin:0;">Create New Post</h4>
                    <div style="font-size:0.8rem;color:rgba(255,255,255,0.35);">Share your thoughts with the world</div>
                </div>
            </div>

            {% if error %}
            <div class="alert-glass p-3 mb-3 d-flex align-items-center gap-2" style="font-size:0.875rem;">
                <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Title <span style="color:#ff6b9d">*</span></label>
                    <input type="text" name="title" class="form-control"
                           placeholder="Enter an engaging title..." minlength="5" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category <span style="color:#ff6b9d">*</span></label>
                    <select name="category" class="form-select" required>
                        <option value="">Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Content <span style="color:#ff6b9d">*</span></label>
                    <textarea name="content" class="form-control" rows="10"
                              placeholder="Write your post content here..." required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Cover Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*" id="imgInput">
                    <div id="imgPreview" style="display:none;margin-top:0.75rem;">
                        <img id="previewImg" src="" alt="Preview"
                             style="max-height:200px;border-radius:12px;object-fit:cover;border:1px solid rgba(255,255,255,0.1);">
                    </div>
                    <div style="font-size:0.75rem;color:rgba(255,255,255,0.25);margin-top:0.35rem;">
                        <i class="fa-solid fa-circle-info me-1"></i> Max 2MB. JPEG, PNG, WebP.
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn-gradient">
                        <i class="fa-solid fa-paper-plane"></i> Publish Post
                    </button>
                    <a href="/posts/" class="btn-outline-glass">
                        <i class="fa-solid fa-xmark"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('imgInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('imgPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
});
</script>
{% endblock %}
