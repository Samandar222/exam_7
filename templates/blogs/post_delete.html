{% extends 'base.html' %}
{% block title %}Delete Post — Blog API{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card p-4 text-center">
            <div style="width:72px;height:72px;background:rgba(245,0,87,0.1);border:1px solid rgba(245,0,87,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.75rem;color:#ff4081;">
                <i class="fa-solid fa-trash"></i>
            </div>
            <h4 style="font-weight:800;margin-bottom:0.5rem;">Delete Post?</h4>
            <p style="color:rgba(255,255,255,0.4);font-size:0.875rem;margin-bottom:0.4rem;">
                You are about to permanently delete:
            </p>
            <p style="font-weight:700;color:#e0e0f0;margin-bottom:1rem;">"{{ post.title }}"</p>
            <p style="color:rgba(255,255,255,0.28);font-size:0.78rem;margin-bottom:2rem;">
                This action cannot be undone. All comments and likes will also be removed.
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn-gradient-danger">
                        <i class="fa-solid fa-trash"></i> Yes, Delete
                    </button>
                    <a href="/posts/{{ post.pk }}/" class="btn-outline-glass">
                        <i class="fa-solid fa-arrow-left"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
