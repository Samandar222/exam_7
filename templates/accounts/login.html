{% extends 'base.html' %}
{% block title %}Login — Blog API{% endblock %}

{% block extra_css %}
<style>
.auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
}
.auth-card {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 24px;
    padding: 2.5rem;
    backdrop-filter: blur(20px);
}
.auth-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(0,212,255,0.15));
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin: 0 auto 1.5rem;
}
.auth-title { font-size:1.6rem; font-weight:800; text-align:center; margin-bottom:0.3rem; }
.auth-sub { text-align:center; color:rgba(255,255,255,0.35); font-size:0.875rem; margin-bottom:2rem; }
.btn-auth {
    width:100%; padding:0.75rem;
    background: linear-gradient(135deg, #6c63ff, #8b80ff);
    border:none; border-radius:12px; color:#fff; font-weight:700; font-size:1rem;
    transition:all 0.2s; cursor:pointer;
}
.btn-auth:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(108,99,255,0.45); }
.divider-text {
    display:flex; align-items:center; gap:1rem; color:rgba(255,255,255,0.2); font-size:0.8rem;
    margin: 1.5rem 0;
}
.divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-icon">
            <i class="fa-solid fa-right-to-bracket" style="color:#8b80ff"></i>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your account</p>

        {% if error %}
        <div class="alert-glass p-3 mb-3 d-flex align-items-center gap-2" style="font-size:0.875rem;">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter your username" autocomplete="username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter your password" autocomplete="current-password" required>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Sign In
            </button>
        </form>

        <div class="divider-text">or</div>

        <p style="text-align:center; font-size:0.875rem; color:rgba(255,255,255,0.4);">
            Don't have an account?
            <a href="/register/" style="color:#8b80ff; font-weight:600; text-decoration:none;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
